name: Android CI
on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

jobs:
  build:
    name: Assemble + Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      # Write google-services.json from secret, or generate a valid dummy
      # so Firebase SDK initializes without crashing the build.
      # The google-services plugin is declared in root build.gradle.kts
      # but not applied at app level, so Firebase reads this at runtime only.
      - name: Write google-services.json
        working-directory: apps/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
          else
            cat > google-services.json << 'DUMMY'
          {
            "project_info": { "project_number": "000000000000", "project_id": "eldercare-ci-dummy", "storage_bucket": "eldercare-ci-dummy.appspot.com" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "com.eldercareguardian" } }, "api_key": [{ "current_key": "CI_DUMMY_KEY" }] }],
            "configuration_version": "1"
          }
          DUMMY
          fi

      - name: Build debug APK
        working-directory: apps/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        working-directory: apps/android
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: apps/android/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Signed Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Write google-services.json
        working-directory: apps/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
          else
            cat > google-services.json << 'DUMMY'
          {
            "project_info": { "project_number": "000000000000", "project_id": "eldercare-ci-dummy", "storage_bucket": "eldercare-ci-dummy.appspot.com" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "com.eldercareguardian" } }, "api_key": [{ "current_key": "CI_DUMMY_KEY" }] }],
            "configuration_version": "1"
          }
          DUMMY
          fi

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/eldercare-release.jks
            echo "KEYSTORE_PATH=$RUNNER_TEMP/eldercare-release.jks" >> $GITHUB_ENV
          fi

      - name: Build signed release AAB
        working-directory: apps/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-aab
          path: apps/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 90