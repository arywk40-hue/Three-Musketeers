name: Android CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

jobs:
  build:
    name: Assemble + Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          android-version: '35'
          components: platform-tools,build-tools-35.0.0,platforms;android-35

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Generate Gradle wrapper
        working-directory: apps/android
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x apps/android/gradlew

      - name: Build debug APK
        run: ./apps/android/gradlew -p apps/android assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        run: ./apps/android/gradlew -p apps/android testDebugUnitTest --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: apps/android/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn
          retention-days: 14
