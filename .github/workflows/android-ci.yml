name: Android CI
on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android-ci.yml'
  workflow_dispatch:

jobs:
  build:
    name: Assemble + Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Fix ❶: Accept SDK licenses before sdkmanager install
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # Fix ❷: Let gradle-wrapper.properties control the version
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Ensure Gradle wrapper is executable
        working-directory: apps/android
        run: chmod +x gradlew

      # Fix ❸: Write google-services.json from secret
      - name: Write google-services.json
        working-directory: apps/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > google-services.json

      - name: Build debug APK
        working-directory: apps/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        working-directory: apps/android
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: apps/android/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Signed Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Fix ❶: Accept SDK licenses before sdkmanager install
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # Fix ❷: Let gradle-wrapper.properties control the version
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Ensure Gradle wrapper is executable
        working-directory: apps/android
        run: chmod +x gradlew

      # Fix ❸: Write google-services.json from secret
      - name: Write google-services.json
        working-directory: apps/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > google-services.json

      # Fix ❹: Decode keystore to $RUNNER_TEMP and export KEYSTORE_PATH env var
      #         build.gradle.kts reads KEYSTORE_PATH directly — no keystore.properties needed
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > $RUNNER_TEMP/eldercare-release.jks
          echo "KEYSTORE_PATH=$RUNNER_TEMP/eldercare-release.jks" >> $GITHUB_ENV

      - name: Build signed release AAB
        working-directory: apps/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-aab
          path: apps/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 90