name: Deploy ToS to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/tos/**'
      - 'apps/privacy-policy/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Pages content
        run: |
          mkdir -p _site/tos _site/privacy-policy
          
          # Verify source files exist
          if [ ! -f apps/tos/index.html ]; then
            echo "Error: apps/tos/index.html not found"
            exit 1
          fi
          if [ ! -f apps/privacy-policy/index.html ]; then
            echo "Error: apps/privacy-policy/index.html not found"
            exit 1
          fi
          
          cp apps/tos/index.html _site/tos/index.html
          cp apps/privacy-policy/index.html _site/privacy-policy/index.html
          
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html><head>
            <meta http-equiv="refresh" content="0;url=tos/">
            <title>ElderCare Guardian</title>
          </head><body>
            <p><a href="tos/">Terms of Service</a> | <a href="privacy-policy/">Privacy Policy</a></p>
          </body></html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
